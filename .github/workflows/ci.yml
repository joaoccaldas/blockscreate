name: CI

# Runs the headless test suites and a syntax check on every push and PR so
# regressions are caught before they reach the deployed Pages site.

on:
  push:
    branches: [main, 'claude/**']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          # Match the environment the committed art was generated on. zlib's
          # deflate output is not byte-identical across Node majors, so the
          # generated-PNG bytes only reproduce on the same major version.
          node-version: '22'

      - name: Syntax check all modules
        run: |
          for f in $(find src test tools -name '*.js' -o -name '*.mjs'); do
            node --check "$f"
          done

      - name: Run test suites
        run: node tools/run-tests.mjs

      # Advisory only: art is validated for real (valid PNG + dimensions) by
      # test/assets.mjs, which is environment-independent. The byte-exact
      # regeneration check below can legitimately differ across Node/zlib
      # versions, so it must never fail the build — it just warns.
      - name: Generated-art drift (advisory)
        continue-on-error: true
        run: |
          node tools/gen-sprites.mjs
          node tools/gen-textures.mjs
          if ! git diff --quiet -- assets/generated/sprites assets/generated/textures/blocks_extra.png; then
            echo "::warning::Generated art bytes differ here (often just a Node/zlib version difference). Regenerate locally if intentional."
            git --no-pager diff --stat -- assets/generated/sprites assets/generated/textures
          fi
